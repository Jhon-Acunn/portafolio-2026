version: "3.9"

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-2026
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    # Optional: Add your env vars here if needed
    # env_file:
    #   - .env.production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    # Optional: Add labels for Portainer stack management
    labels:
      - "app=portfolio-2026"
      - "environment=production"
